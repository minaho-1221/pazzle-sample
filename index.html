<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手羽先パズル🍗</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --gold:#f5a623;--amber:#e8740c;--dark:#1a0e00;--cream:#fff8ee; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);font-family:'M PLUS Rounded 1c',sans-serif;color:var(--cream);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 100%,#3d1500 0%,#1a0e00 60%);z-index:0;}
  .wrapper{position:relative;z-index:1;}
  header{text-align:center;padding:14px 12px 6px;}
  header h1{font-family:'Dela Gothic One',sans-serif;font-size:clamp(1.3rem,5vw,2rem);color:var(--gold);text-shadow:0 0 20px #f5a62366,3px 3px 0 var(--amber);}
  header p{font-size:.75rem;color:#cda97a;margin-top:3px;}
  .hud{display:flex;justify-content:center;gap:12px;padding:6px 12px;flex-wrap:wrap;}
  .hud-box{background:rgba(245,166,35,.1);border:1.5px solid var(--amber);border-radius:10px;padding:5px 16px;text-align:center;min-width:100px;}
  .hud-label{font-size:.6rem;color:#cda97a;text-transform:uppercase;letter-spacing:1px;}
  .hud-value{font-family:'Dela Gothic One',sans-serif;font-size:1.3rem;color:var(--gold);}
  .btn-row{display:flex;gap:8px;justify-content:center;padding:6px;}
  button{font-family:'Dela Gothic One',sans-serif;font-size:.85rem;padding:8px 18px;border:none;border-radius:30px;cursor:pointer;transition:transform .15s;}
  button:hover{transform:translateY(-2px);}
  #btn-start{background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--dark);box-shadow:0 4px 16px rgba(245,166,35,.4);}
  #btn-reset{background:rgba(255,255,255,.1);color:var(--cream);border:1.5px solid rgba(255,255,255,.2);}
  #game-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:6px 10px 10px;}
  #board-wrap{position:relative;flex-shrink:0;}
  #board{position:relative;background:rgba(255,255,255,.03);border:2px solid rgba(245,166,35,.25);border-radius:6px;overflow:visible;}
  .slot{position:absolute;border:1px dashed rgba(245,166,35,.12);pointer-events:none;}
  .slot.filled{border-color:rgba(76,175,80,.3);background:rgba(76,175,80,.05);}
  #tray-wrap{display:flex;flex-direction:column;gap:4px;}
  #tray-label{font-size:.65rem;color:#cda97a;text-transform:uppercase;letter-spacing:1px;text-align:center;}
  #tray{position:relative;background:rgba(255,255,255,.04);border:2px dashed rgba(245,166,35,.25);border-radius:8px;overflow:hidden;}
  .piece{position:absolute;cursor:grab;filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));transition:filter .15s;user-select:none;touch-action:none;}
  .piece:hover{filter:drop-shadow(0 6px 16px rgba(245,166,35,.6));}
  .piece.dragging{cursor:grabbing;filter:drop-shadow(0 10px 24px rgba(245,166,35,.8));z-index:999;}
  .piece.placed{cursor:default;pointer-events:none;filter:none;}
  .piece canvas{display:block;}
  #leaderboard{max-width:320px;margin:0 auto 14px;background:rgba(245,166,35,.07);border:1.5px solid rgba(245,166,35,.25);border-radius:12px;padding:12px 18px;}
  #leaderboard h2{font-family:'Dela Gothic One',sans-serif;font-size:.95rem;color:var(--gold);text-align:center;margin-bottom:8px;letter-spacing:2px;}
  .rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(245,166,35,.12);}
  .rank-row:last-child{border-bottom:none;}
  .rank-medal{font-size:1.2rem;width:26px;text-align:center;}
  .rank-name{flex:1;font-size:.9rem;}
  .rank-time{font-family:'Dela Gothic One',sans-serif;color:var(--gold);font-size:.95rem;}
  .rank-empty{color:rgba(205,169,122,.4);font-size:.82rem;font-style:italic;}
  #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;justify-content:center;align-items:center;}
  #modal.show{display:flex;}
  #modal-box{background:linear-gradient(135deg,#2a1500,#1a0e00);border:2px solid var(--gold);border-radius:18px;padding:32px 36px;text-align:center;max-width:340px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  #modal-box h2{font-family:'Dela Gothic One',sans-serif;font-size:1.8rem;color:var(--gold);margin-bottom:4px;}
  #modal-box .final-time{font-family:'Dela Gothic One',sans-serif;font-size:2.4rem;color:#fff;margin:8px 0;}
  #modal-box p{color:#cda97a;margin-bottom:14px;font-size:.9rem;}
  #name-input{width:100%;padding:9px 14px;border-radius:30px;border:2px solid var(--amber);background:rgba(255,255,255,.08);color:white;font-family:'M PLUS Rounded 1c',sans-serif;font-size:.95rem;text-align:center;outline:none;margin-bottom:10px;}
  #name-input::placeholder{color:rgba(255,255,255,.3);}
  #btn-save{background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--dark);font-size:.95rem;padding:9px 24px;}
  .confetti-piece{position:fixed;width:9px;height:9px;border-radius:2px;animation:fall 1.2s ease-in forwards;z-index:1500;pointer-events:none;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>🍗 手羽先パズル</h1>
    <p>ニュースです！からあげ業界が大変なことに！でも酢っ手羽は絶好調！</p>
  </header>
  <div class="hud">
    <div class="hud-box"><div class="hud-label">タイム</div><div class="hud-value" id="timer">00:00</div></div>
    <div class="hud-box"><div class="hud-label">ピース</div><div class="hud-value" id="progress-text">0/36</div></div>
  </div>
  <div class="btn-row">
    <button id="btn-start">🍗 スタート！</button>
    <button id="btn-reset">🔄 リセット</button>
  </div>
  <div id="game-area">
    <div id="board-wrap"><div id="board"></div></div>
    <div id="tray-wrap">
      <div id="tray-label">🍽️ ピーストレイ</div>
      <div id="tray"></div>
    </div>
  </div>
  <div id="leaderboard"><h2>🏆 ランキング</h2><div id="rank-list"></div></div>
</div>
<div id="modal">
  <div id="modal-box">
    <div style="font-size:2.8rem">🎉</div>
    <h2>完成！！</h2>
    <p>すごい！全部完成しました！</p>
    <div class="final-time" id="modal-time">00:00</div>
    <p>ニックネームを入力してランキングに登録しよう！</p>
    <input id="name-input" type="text" maxlength="12" placeholder="ニックネーム（12文字まで）">
    <br><button id="btn-save">💾 登録する</button>
  </div>
</div>

// ===== ELEMENTS =====
const board = document.getElementById('board');
const tray  = document.getElementById('tray');
const timerEl = document.getElementById('timer');
const progressEl = document.getElementById('progress-text');
const modal = document.getElementById('modal');
const modalTime = document.getElementById('modal-time');
const nameInput = document.getElementById('name-input');

// ===== STATE =====
let pieces=[], placed=0, timerInterval=null, seconds=0, started=false, finalSeconds=0;
let pieceW, pieceH, boardW, boardH, TAB, MARGIN;

// connH[r][c]: connector between piece(r,c) bottom and piece(r+1,c) top
//   +1 = bump points DOWN (piece(r,c) bottom has tab going down)
//   -1 = bump points UP  (piece(r,c) bottom has blank, piece(r+1,c) top has tab going up)
// connV[r][c]: connector between piece(r,c) right and piece(r,c+1) left
//   +1 = bump points RIGHT
//   -1 = bump points LEFT
let connH=[], connV=[];

function calcSizes() {
  const maxW = Math.min(window.innerWidth * 0.58, 400);
  boardW = maxW; boardH = maxW;
  pieceW = boardW / COLS;
  pieceH = boardH / ROWS;
  TAB    = pieceW * 0.28;
  MARGIN = Math.ceil(TAB) + 3;
}

// ===== CONNECTORS =====
function buildConnectors() {
  connH=[]; connV=[];
  for(let r=0;r<ROWS-1;r++){ connH[r]=[]; for(let c=0;c<COLS;c++) connH[r][c]=Math.random()<.5?1:-1; }
  for(let r=0;r<ROWS;r++){   connV[r]=[]; for(let c=0;c<COLS-1;c++) connV[r][c]=Math.random()<.5?1:-1; }
}

// Returns dir for each edge of piece (row,col):
//   +1 = tab protrudes OUTWARD from piece on that edge
//   -1 = blank (hollow) on that edge
//   0  = flat border
// Outward directions: top=UP, bottom=DOWN, left=LEFT, right=RIGHT
// 
// KEY: if piece(r,c) bottom tab goes DOWN (+1),
//      piece(r+1,c) top must be hollow = indent going DOWN from outside = dir -1
//      because both edges share the same physical curve going DOWN.
function getConn(row, col, edge) {
  if (edge === 'bottom') return row === ROWS-1 ? 0 :  connH[row][col];
  if (edge === 'top')    return row === 0      ? 0 : -connH[row-1][col];
  if (edge === 'right')  return col === COLS-1 ? 0 :  connV[row][col];
  if (edge === 'left')   return col === 0      ? 0 : -connV[row][col-1];
}

// ===== JIGSAW EDGE DRAWING =====
// Draws one edge of a jigsaw piece from (x1,y1) to (x2,y2).
// nbx, nby: outward normal vector for this edge (unit, axis-aligned)
// dir: +1=tab (bump outward), -1=blank (indent, bump also outward but = hollow visually)
function drawJigsawEdge(ctx, x1, y1, x2, y2, dir, nbx, nby) {
  if (dir === 0) { ctx.lineTo(x2, y2); return; }

  // t: signed bump magnitude in outward direction
  const t = TAB * dir;
  const bx = nbx * t;  // bump vector x
  const by = nby * t;  // bump vector y

  // lerp along edge
  const ex = p => x1 + (x2-x1)*p;
  const ey = p => y1 + (y2-y1)*p;

  // Tab shape: flat → curve up → round top → curve down → flat
  ctx.lineTo(ex(0.30), ey(0.30));

  // rise to tab
  ctx.bezierCurveTo(
    ex(0.30),       ey(0.30),
    ex(0.35)+bx*.6, ey(0.35)+by*.6,
    ex(0.38)+bx,    ey(0.38)+by
  );
  // rounded top of tab
  ctx.bezierCurveTo(
    ex(0.42)+bx,    ey(0.42)+by,
    ex(0.50)+bx*1.1,ey(0.50)+by*1.1,
    ex(0.50)+bx*1.1,ey(0.50)+by*1.1
  );
  ctx.bezierCurveTo(
    ex(0.50)+bx*1.1,ey(0.50)+by*1.1,
    ex(0.58)+bx,    ey(0.58)+by,
    ex(0.62)+bx,    ey(0.62)+by
  );
  // descend from tab
  ctx.bezierCurveTo(
    ex(0.65)+bx*.6, ey(0.65)+by*.6,
    ex(0.70),       ey(0.70),
    ex(0.70),       ey(0.70)
  );
  ctx.lineTo(x2, y2);
}

// ===== BUILD PIECE PATH =====
function buildPiecePath(ctx, col, row, ox, oy) {
  const x0=ox, y0=oy, x1=ox+pieceW, y1=oy+pieceH;

  const cTop    = getConn(row, col, 'top');
  const cRight  = getConn(row, col, 'right');
  const cBottom = getConn(row, col, 'bottom');
  const cLeft   = getConn(row, col, 'left');

  ctx.beginPath();
  ctx.moveTo(x0, y0);

  // TOP edge: left→right, outward normal = UP (0,-1)
  drawJigsawEdge(ctx, x0, y0, x1, y0, cTop,    0, -1);
  // RIGHT edge: top→bottom, outward normal = RIGHT (1,0)
  drawJigsawEdge(ctx, x1, y0, x1, y1, cRight,  1,  0);
  // BOTTOM edge: right→left, outward normal = DOWN (0,1)
  drawJigsawEdge(ctx, x1, y1, x0, y1, cBottom, 0,  1);
  // LEFT edge: bottom→top, outward normal = LEFT (-1,0)
  drawJigsawEdge(ctx, x0, y1, x0, y0, cLeft,  -1,  0);

  ctx.closePath();
}

// ===== DRAW PIECE CANVAS =====
function drawPieceCanvas(img, col, row) {
  const cw = pieceW + MARGIN*2;
  const ch = pieceH + MARGIN*2;
  const canvas = document.createElement('canvas');
  canvas.width=cw; canvas.height=ch;
  const ctx = canvas.getContext('2d');

  const ox=MARGIN, oy=MARGIN;

  // Clip to jigsaw shape
  buildPiecePath(ctx, col, row, ox, oy);
  ctx.save();
  ctx.clip();

  // Draw corresponding image section (with margin bleed)
  const scaleX = img.width  / boardW;
  const scaleY = img.height / boardH;
  ctx.drawImage(
    img,
    col*pieceW*scaleX - MARGIN*scaleX,
    row*pieceH*scaleY - MARGIN*scaleY,
    cw*scaleX, ch*scaleY,
    0, 0, cw, ch
  );

  // Slight inner shadow overlay
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fill();
  ctx.restore();

  // Stroke edge
  buildPiecePath(ctx, col, row, ox, oy);
  ctx.strokeStyle='rgba(0,0,0,0.55)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  return canvas;
}

// ===== IMAGE =====
function loadImage() {
  return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=IMG_SRC;});
}

// ===== TIMER =====
function startTimer(){timerInterval=setInterval(()=>{seconds++;timerEl.textContent=fmt(seconds);},1000);}
function stopTimer(){clearInterval(timerInterval);finalSeconds=seconds;}
function fmt(s){return`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;}

// ===== SLOTS =====
function createSlots(){
  board.style.width=boardW+'px'; board.style.height=boardH+'px'; board.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const s=document.createElement('div'); s.className='slot';
    s.style.cssText=`left:${c*pieceW}px;top:${r*pieceH}px;width:${pieceW}px;height:${pieceH}px;`;
    s.dataset.col=c; s.dataset.row=r; board.appendChild(s);
  }
}

// ===== INIT =====
async function initPuzzle(){
  clearInterval(timerInterval);
  seconds=0;started=false;placed=0;
  timerEl.textContent='00:00';progressEl.textContent=`0/${TOTAL}`;
  pieces=[];tray.innerHTML='';

  const img=await loadImage();
  calcSizes(); buildConnectors(); createSlots();

  const trayW=Math.min(window.innerWidth*.35,200);
  const trayH=boardH;
  tray.style.width=trayW+'px'; tray.style.height=trayH+'px';

  const indices=shuffle([...Array(TOTAL).keys()]);

  indices.forEach((idx,i)=>{
    const col=idx%COLS, row=Math.floor(idx/COLS);
    const canvas=drawPieceCanvas(img,col,row);

    const el=document.createElement('div');
    el.className='piece';
    el.style.width=canvas.width+'px'; el.style.height=canvas.height+'px';
    el.dataset.margin=MARGIN; el.dataset.col=col; el.dataset.row=row; el.dataset.placed='0';
    el.appendChild(canvas);

    const tx=Math.random()*Math.max(0,trayW-canvas.width*.6);
    const ty=i*((trayH-canvas.height)/TOTAL)*.88;
    el.style.left=tx+'px'; el.style.top=ty+'px';

    tray.appendChild(el);
    makeDraggable(el);
    pieces.push(el);
  });
}

// ===== DRAG =====
let dragging=null, offsetX=0, offsetY=0;

function makeDraggable(el){
  el.addEventListener('mousedown',dragStart);
  el.addEventListener('touchstart',dragStart,{passive:false});
}

function dragStart(e){
  const el=e.currentTarget;
  if(!el||el.dataset.placed==='1')return;
  if(!started){started=true;startTimer();}
  e.preventDefault();
  dragging=el; el.classList.add('dragging');
  const rect=el.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  offsetX=cx-rect.left; offsetY=cy-rect.top;
  document.body.appendChild(el);
  el.style.position='fixed'; el.style.zIndex=999;
  el.style.left=(cx-offsetX)+'px'; el.style.top=(cy-offsetY)+'px';
}

document.addEventListener('mousemove',dragMove);
document.addEventListener('touchmove',dragMove,{passive:false});
function dragMove(e){
  if(!dragging)return; e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  dragging.style.left=(cx-offsetX)+'px'; dragging.style.top=(cy-offsetY)+'px';
}

document.addEventListener('mouseup',dragEnd);
document.addEventListener('touchend',dragEnd);
function dragEnd(e){
  if(!dragging)return;
  const el=dragging; dragging=null; el.classList.remove('dragging');
  const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
  const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;

  const margin=parseInt(el.dataset.margin);
  const tCol=parseInt(el.dataset.col), tRow=parseInt(el.dataset.row);
  const boardRect=board.getBoundingClientRect();

  // Canvas top-left drop position (screen coords)
  const dropL=cx-offsetX, dropT=cy-offsetY;
  // Cell origin in board-relative coords
  const bx=dropL+margin-boardRect.left;
  const by=dropT+margin-boardRect.top;

  const slotBx=tCol*pieceW, slotBy=tRow*pieceH;
  const tolerance=pieceW*.45;
  const onBoard=bx>-pieceW*.6&&bx<boardW+pieceW*.6&&by>-pieceH*.6&&by<boardH+pieceH*.6;

  if(onBoard&&Math.abs(bx-slotBx)<tolerance&&Math.abs(by-slotBy)<tolerance){
    // ✅ SNAP
    el.style.position='absolute';
    el.style.left=(slotBx-margin)+'px'; el.style.top=(slotBy-margin)+'px';
    el.style.zIndex=10; el.dataset.placed='1'; el.classList.add('placed');
    board.appendChild(el);
    const slot=board.querySelector(`.slot[data-col="${tCol}"][data-row="${tRow}"]`);
    if(slot)slot.classList.add('filled');
    placed++; progressEl.textContent=`${placed}/${TOTAL}`;
    flashPiece(el); if(placed===TOTAL)onComplete();
  } else if(onBoard){
    // 🟡 Free place on board
    el.style.position='absolute';
    el.style.left=(bx-margin)+'px'; el.style.top=(by-margin)+'px';
    el.style.zIndex=50; el.dataset.placed='0';
    board.appendChild(el);
  } else {
    // Back to tray
    el.style.position='absolute'; el.style.zIndex='';
    const trayRect=tray.getBoundingClientRect();
    const tx=Math.max(0,Math.min(tray.offsetWidth-el.offsetWidth,cx-trayRect.left-offsetX));
    const ty=Math.max(0,Math.min(tray.offsetHeight-el.offsetHeight,cy-trayRect.top-offsetY));
    el.style.left=tx+'px'; el.style.top=ty+'px'; tray.appendChild(el);
  }
}

// ===== COMPLETE =====
function flashPiece(el){el.style.filter='drop-shadow(0 0 14px rgba(76,175,80,.9))';setTimeout(()=>el.style.filter='none',400);}
function onComplete(){stopTimer();spawnConfetti();setTimeout(()=>{modalTime.textContent=fmt(finalSeconds);modal.classList.add('show');nameInput.value='';nameInput.focus();},700);}
function spawnConfetti(){
  const colors=['#f5a623','#e03c31','#4caf50','#fff','#ffeb3b'];
  for(let i=0;i<60;i++)setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[~~(Math.random()*colors.length)];
    c.style.animationDuration=(0.8+Math.random()*.8)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),1500);
  },i*20);
}

// ===== LEADERBOARD =====
function getRecords(){try{return JSON.parse(localStorage.getItem('tebasaki_lb')||'[]');}catch{return[];}}
function saveRecord(name,secs){let r=getRecords();r.push({name,secs});r.sort((a,b)=>a.secs-b.secs);r=r.slice(0,2);localStorage.setItem('tebasaki_lb',JSON.stringify(r));renderLeaderboard();}
function renderLeaderboard(){
  const records=getRecords(),medals=['🥇','🥈'],rl=document.getElementById('rank-list');rl.innerHTML='';
  [0,1].forEach(i=>{
    const row=document.createElement('div');row.className='rank-row';
    row.innerHTML=records[i]
      ?`<span class="rank-medal">${medals[i]}</span><span class="rank-name">${records[i].name}</span><span class="rank-time">${fmt(records[i].secs)}</span>`
      :`<span class="rank-medal">${medals[i]}</span><span class="rank-name rank-empty">－ まだ記録なし</span>`;
    rl.appendChild(row);
  });
}

document.getElementById('btn-save').addEventListener('click',()=>{saveRecord(nameInput.value.trim()||'ななし',finalSeconds);modal.classList.remove('show');});
document.getElementById('btn-start').addEventListener('click',initPuzzle);
document.getElementById('btn-reset').addEventListener('click',initPuzzle);

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

calcSizes(); renderLeaderboard(); initPuzzle();
</script>
